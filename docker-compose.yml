services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agri
      POSTGRES_PASSWORD: agri
      POSTGRES_DB: agri_agent_mesh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./configs/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build: .
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8080
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - mosquitto

  orchestrator:
    build: .
    command: python -m apps.orchestrator.main
    env_file: .env
    depends_on:
      - api
      - redis
      - mosquitto

volumes:
  postgres_data:
  minio_data:
